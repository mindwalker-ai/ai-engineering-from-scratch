name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'glossary/**'
      - 'phases/**/docs/en.md'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to enable Pages and publish the artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build static site
        run: node site/build.js

      - name: Configure Pages
        # enablement:true turns on Pages (build_type=workflow) on the first run,
        # so no manual Settings → Pages toggle is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
